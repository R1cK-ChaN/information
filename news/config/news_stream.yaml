storage:
  sqlite_path: "data/news_sync.db"
  output_dir: "../output"

providers:
  rss:
    timeout_seconds: 15
    max_items_per_feed: 10
    enabled: true
  telegram:
    timeout_seconds: 15
    max_items_per_channel: 20
    enabled: true
    realtime:
      enabled: false
      batch_interval_seconds: 30
      batch_size: 10
      session_dir: "data/telegram_session"
  article_fetcher:
    timeout_seconds: 20
    max_content_chars: 15000
  paywall_fetcher:
    domains:
      - bloomberg.com
      - reuters.com
      - barrons.com
      - nytimes.com
      - wsj.com
      - fxstreet.com
      - theblock.co
      - france24.com
      - economist.com
      - forbes.com
    browser_data_dir: "data/browser_profile"
    timeout_ms: 30000
  summarizer:
    api_key_env: "GROQ_API_KEY"
    model: "llama-3.1-8b-instant"
    max_tokens: 150

retry:
  max_retries: 3
  base_delay_seconds: 2

polling:
  default_interval_minutes: 15
  cooldown_minutes: 5
  max_consecutive_failures: 3

deduplicator:
  similarity_threshold: 0.6
  lookback_hours: 24
