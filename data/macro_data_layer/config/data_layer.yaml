storage:
  sqlite_path: "data/macro_data.db"

providers:
  fred:
    api_key_env: "FRED_API_KEY"
    rate_limit_per_minute: 120
    enabled: true

retry:
  max_retries: 3
  base_delay_seconds: 2

# TTL for staleness checks (in hours)
ttl:
  daily: 24
  weekly: 168
  monthly: 24
  quarterly: 168
  annual: 720
